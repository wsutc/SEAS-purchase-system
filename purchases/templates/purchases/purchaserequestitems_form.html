{% extends "purchases/layout.html" %}
{% load widget_tweaks %}
{% block title %}
    Add Item
{% endblock %}
{% block content %}

<h1 name class="wsu-c-heading">Add Item</h1>

<form method="POST" class="row g-3">
    {% csrf_token %}
    <table>
    {{ form.as_table }}
    </table>
    <div class="col-12">
      <button type="submit" class="save btn btn-primary">Save</button>
    </div>
  </form>
{% endblock %}
